version: 1

frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefer-offline --no-audit
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - mkdir -p .amplify-hosting/compute/default
        - cp -r dist/* .amplify-hosting/compute/default/
        - cp -r node_modules .amplify-hosting/compute/default/

  artifacts:
    baseDirectory: .amplify-hosting/compute/default
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*
