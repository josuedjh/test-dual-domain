version: 1

frontend:
  phases:
    install:
      commands:
        - npm ci
    build:
      commands:
        - npm run build

  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*

backend:
  phases:
    build:
      commands:
        - echo "No backend build phase"
