version: 1

frontend:
  phases:
    preBuild:
      commands:
        # Instalar dependencias en raíz
        - npm ci --cache .npm --prefer-offline
        # Instalar dependencias en @packages/ (npm install porque packages/ usa yarn.lock)
        - cd packages && npm install && cd ..
    build:
      commands:
        # Ejecuta: webpack build → copia HTML → astro build
        - npm run build
        # Copiar node_modules a .amplify-hosting/ para SSR Lambda
        - mv node_modules ./.amplify-hosting/compute/default

  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'

  cache:
    paths:
      - .npm/**/*
